<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Contenido - Rurulab Admin</title>
    <link href="/css/styles.css" rel="stylesheet">
    <script src="/auth.js"></script>
    <script src="/js/analytics-loader.js" defer></script>
</head>

<body class="text-stone-800 antialiased bg-gray-50 min-h-screen">
    <div id="nav-placeholder"></div>

    <nav class="bg-white shadow-sm border-b border-gray-200 px-4 sm:px-6 py-4 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto flex flex-col gap-4 sm:flex-row sm:justify-between sm:items-center">
            <div class="flex items-center justify-between sm:justify-start gap-4">
                <div class="flex items-center gap-3">
                    <a href="/app/admin-dashboard" class="text-gray-500 hover:text-gray-900 p-2 -ml-2" aria-label="Volver">
                        <i class="fas fa-arrow-left text-lg"></i>
                    </a>
                    <h1 class="text-lg sm:text-xl font-bold text-amber-900">Gestión de Blog & Eventos</h1>
                </div>
                <a href="/app/admin-blog/editor"
                    class="sm:hidden bg-amber-800 hover:bg-amber-900 text-white font-bold p-2.5 rounded-lg flex items-center justify-center transition-colors"
                    title="Nuevo Post/Evento">
                    <i class="fas fa-plus"></i>
                </a>
            </div>

            <div class="flex items-center justify-between sm:justify-end gap-3 w-full sm:w-auto">
                <div class="flex rounded-lg border border-gray-200 overflow-hidden text-sm w-full sm:w-auto">
                    <button id="filter-all" class="flex-1 sm:flex-none px-3 py-2 bg-gray-800 text-white font-medium transition-colors"
                        onclick="setFilter('all')">Todos</button>
                    <button id="filter-blog"
                        class="flex-1 sm:flex-none px-3 py-2 bg-white text-gray-600 hover:bg-gray-50 font-medium transition-colors border-l border-gray-200"
                        onclick="setFilter('blog')">
                        <i class="fas fa-pen-nib mr-1"></i> Blog
                    </button>
                    <button id="filter-event"
                        class="flex-1 sm:flex-none px-3 py-2 bg-white text-gray-600 hover:bg-gray-50 font-medium transition-colors border-l border-gray-200"
                        onclick="setFilter('event')">
                        <i class="fas fa-calendar-alt mr-1"></i> Eventos
                    </button>
                </div>
                <a href="/app/admin-blog/editor"
                    class="hidden sm:flex bg-amber-800 hover:bg-amber-900 text-white font-bold py-2 px-4 rounded-lg items-center gap-2 transition-colors">
                    <i class="fas fa-plus"></i> Nuevo
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        
        <div class="hidden md:block bg-white rounded-xl shadow overflow-hidden border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Título</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tipo</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody id="posts-table-body" class="bg-white divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>

        <div id="posts-cards-container" class="md:hidden space-y-4">
            <div class="text-center py-10 text-gray-500 bg-white rounded-xl border border-gray-200">
                <i class="fas fa-circle-notch fa-spin text-2xl mb-2"></i><br>Cargando...
            </div>
        </div>

    </main>

    <script>
        let allPosts = [];
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', loadPosts);

        async function loadPosts() {
            try {
                allPosts = await api('/api/admin/blog');
                renderContent(filterPosts(allPosts));
            } catch (error) {
                console.error(error);
                const errorMsg = `Error cargando datos: ${error.message}`;
                document.getElementById('posts-table-body').innerHTML = `<tr><td colspan="5" class="text-center text-red-500 py-4">${errorMsg}</td></tr>`;
                document.getElementById('posts-cards-container').innerHTML = `<div class="text-center text-red-500 py-6 bg-white rounded-xl border border-gray-200">${errorMsg}</div>`;
            }
        }

        function setFilter(type) {
            currentFilter = type;
            ['all', 'blog', 'event'].forEach(t => {
                const btn = document.getElementById('filter-' + t);
                if (t === type) {
                    btn.className = 'flex-1 sm:flex-none px-3 py-2 bg-gray-800 text-white font-medium transition-colors' + (t !== 'all' ? ' border-l border-gray-200' : '');
                } else {
                    btn.className = 'flex-1 sm:flex-none px-3 py-2 bg-white text-gray-600 hover:bg-gray-50 font-medium transition-colors' + (t !== 'all' ? ' border-l border-gray-200' : '');
                }
            });
            renderContent(filterPosts(allPosts));
        }

        function filterPosts(posts) {
            if (currentFilter === 'blog') return posts.filter(p => !p.is_event);
            if (currentFilter === 'event') return posts.filter(p => p.is_event);
            return posts;
        }

        function formatEventDate(post) {
            if (!post.is_event) return new Date(post.created_at).toLocaleDateString('es', { day: '2-digit', month: 'short', year: 'numeric' });
            const start = post.event_start_date ? new Date(post.event_start_date + 'T00:00').toLocaleDateString('es', { day: '2-digit', month: 'short' }) : '—';
            const end = post.event_end_date ? new Date(post.event_end_date + 'T00:00').toLocaleDateString('es', { day: '2-digit', month: 'short', year: 'numeric' }) : '';
            return end ? `${start} – ${end}` : start;
        }

        function renderContent(posts) {
            const tbody = document.getElementById('posts-table-body');
            const cardContainer = document.getElementById('posts-cards-container');

            if (posts.length === 0) {
                const emptyStateHtml = `No hay contenido en esta categoría.`;
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-gray-500">${emptyStateHtml}</td></tr>`;
                cardContainer.innerHTML = `<div class="text-center py-10 text-gray-500 bg-white rounded-xl border border-gray-200">${emptyStateHtml}</div>`;
                return;
            }

            // Renderizar versión Escritorio (Tabla)
            tbody.innerHTML = posts.map(post => {
                const isEvent = post.is_event == 1 || post.is_event === true;
                const typeBadge = getTypeBadge(isEvent);
                const statusBadge = getStatusBadge(post.is_published);

                return `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="h-10 w-10 flex-shrink-0">
                                <img class="h-10 w-10 rounded-md object-cover"
                                     src="${post.cover_image || 'https://placehold.co/100?text=IMG'}"
                                     onerror="this.src='https://placehold.co/100?text=IMG'" alt="">
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">${post.title}</div>
                                <div class="text-xs text-gray-400 truncate max-w-xs">/${post.slug}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">${typeBadge}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${statusBadge}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formatEventDate(post)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <a href="/app/admin-blog/editor?id=${post.id}" class="text-indigo-600 hover:text-indigo-900 mr-4 inline-block p-1" title="Editar">
                            <i class="fas fa-edit text-base"></i>
                        </a>
                        <a href="/blog/${post.slug}" target="_blank" class="text-gray-400 hover:text-gray-600 mr-4 inline-block p-1" title="Ver en vivo">
                            <i class="fas fa-eye text-base"></i>
                        </a>
                        <button onclick="deletePost('${post.id}')" class="text-red-600 hover:text-red-900 inline-block p-1" title="Eliminar">
                            <i class="fas fa-trash text-base"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');

            // Renderizar versión Móvil (Tarjetas)
            cardContainer.innerHTML = posts.map(post => {
                const isEvent = post.is_event == 1 || post.is_event === true;
                const typeBadge = getTypeBadge(isEvent);
                const statusBadge = getStatusBadge(post.is_published);

                return `
                <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 flex flex-col gap-3">
                    <div class="flex items-start gap-3">
                        <img class="h-14 w-14 rounded-md object-cover flex-shrink-0"
                             src="${post.cover_image || 'https://placehold.co/100?text=IMG'}"
                             onerror="this.src='https://placehold.co/100?text=IMG'" alt="">
                        <div class="min-w-0 flex-1">
                            <div class="text-sm font-semibold text-gray-900 leading-tight break-words">${post.title}</div>
                            <div class="text-xs text-gray-400 truncate mt-0.5">/${post.slug}</div>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between border-t border-gray-100 pt-3">
                        <div class="flex flex-wrap gap-2">
                            ${typeBadge}
                            ${statusBadge}
                        </div>
                        <div class="text-xs text-gray-500">
                            <i class="far fa-clock mr-1"></i>${formatEventDate(post)}
                        </div>
                    </div>

                    <div class="grid grid-cols-3 border-t border-gray-100 mt-1 -mx-4 -mb-4 overflow-hidden rounded-b-xl">
                        <a href="/app/admin-blog/editor?id=${post.id}" 
                           class="flex items-center justify-center gap-1 py-3 text-sm font-medium text-indigo-600 hover:bg-indigo-50 border-r border-gray-100 active:bg-indigo-100 transition-colors">
                            <i class="fas fa-edit"></i> Editar
                        </a>
                        <a href="/blog/${post.slug}" target="_blank" 
                           class="flex items-center justify-center gap-1 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 border-r border-gray-100 active:bg-gray-100 transition-colors">
                            <i class="fas fa-eye"></i> Ver
                        </a>
                        <button onclick="deletePost('${post.id}')" 
                                class="flex items-center justify-center gap-1 py-3 text-sm font-medium text-red-600 hover:bg-red-50 active:bg-red-100 transition-colors">
                            <i class="fas fa-trash"></i> Borrar
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        // Helpers de badges reutilizables
        function getTypeBadge(isEvent) {
            return isEvent
                ? `<span class="px-2 py-0.5 inline-flex items-center gap-1 text-xs leading-5 font-semibold rounded-full bg-indigo-100 text-indigo-800">
                       <i class="fas fa-calendar-alt text-[10px]"></i> Evento
                   </span>`
                : `<span class="px-2 py-0.5 inline-flex items-center gap-1 text-xs leading-5 font-semibold rounded-full bg-amber-100 text-amber-800">
                       <i class="fas fa-pen-nib text-[10px]"></i> Blog
                   </span>`;
        }

        function getStatusBadge(isPublished) {
            return isPublished
                ? `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">Publicado</span>`
                : `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">Borrador</span>`;
        }

        async function deletePost(id) {
            if (!confirm('¿Estás seguro de eliminar este artículo? Esta acción no se puede deshacer.')) return;
            try {
                await api(`/api/admin/blog/${id}`, { method: 'DELETE' });
                loadPosts();
            } catch (error) {
                alert('Error al eliminar: ' + error.message);
            }
        }
    </script>
    <script src="/js/nav-loader.js" defer></script>
</body>

</html>
