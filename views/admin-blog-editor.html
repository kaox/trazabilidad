<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Contenido - Rurulab Admin</title>
    <link href="/css/styles.css" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="/auth.js"></script>
    <style>
        /* ── Toggle Switch ── */
        .toggle-switch { position: relative; display: inline-block; width: 52px; height: 28px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; inset: 0;
            background: #d1d5db; border-radius: 28px;
            transition: .3s;
        }
        .toggle-slider::before {
            content: ''; position: absolute;
            height: 20px; width: 20px;
            left: 4px; bottom: 4px;
            background: white; border-radius: 50%;
            transition: .3s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        input:checked + .toggle-slider { background: #4f46e5; }
        input:checked + .toggle-slider::before { transform: translateX(24px); }

        /* ── Event section collapse ── */
        #event-fields {
            max-height: 0; overflow: hidden;
            transition: max-height .4s ease, opacity .3s ease;
            opacity: 0;
        }
        #event-fields.open { max-height: 2000px; opacity: 1; }

        /* ── Company multi-select ── */
        .company-search-box {
            border: 1px solid #d1d5db; border-radius: 8px;
            overflow: hidden;
        }
        .company-search-input {
            width: 100%; padding: 8px 12px; border: none; border-bottom: 1px solid #e5e7eb;
            outline: none; font-size: 13px; background: #f9fafb;
        }
        .company-list {
            max-height: 200px; overflow-y: auto;
        }
        .company-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; cursor: pointer;
            transition: background .15s;
        }
        .company-item:hover { background: #f3f4f6; }
        .company-item.selected { background: #eef2ff; }
        .company-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            object-fit: cover; background: #e5e7eb;
            flex-shrink: 0;
        }
        .company-name { font-size: 13px; color: #374151; flex: 1; }
        .company-badge {
            font-size: 10px; padding: 1px 6px; border-radius: 999px;
            font-weight: 600; text-transform: uppercase; letter-spacing: .4px;
        }
        .badge-user { background: #d1fae5; color: #065f46; }
        .badge-suggested { background: #e0e7ff; color: #3730a3; }
        .company-check { color: #4f46e5; font-size: 14px; }

        /* ── Chips ── */
        .chips-container {
            display: flex; flex-wrap: wrap; gap: 6px;
            min-height: 36px; padding: 6px;
            border: 1px solid #e5e7eb; border-radius: 8px;
            background: #f9fafb;
        }
        .chip {
            display: flex; align-items: center; gap: 6px;
            background: #e0e7ff; color: #3730a3;
            border-radius: 999px; padding: 4px 10px;
            font-size: 12px; font-weight: 500;
        }
        .chip img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; }
        .chip-remove {
            cursor: pointer; color: #6366f1;
            font-size: 11px; line-height: 1;
        }
        .chip-remove:hover { color: #ef4444; }

        /* ── Section header ── */
        .section-header {
            display: flex; align-items: center; gap-3; gap: 10px;
            padding: 10px 0; border-bottom: 2px solid #e5e7eb; margin-bottom: 20px;
        }
        .section-header i { color: #4f46e5; }
        .section-header span { font-weight: 700; color: #1e1b4b; font-size: 15px; }

        /* Quill override */
        .ql-container { font-size: 15px; }
        .ql-editor { min-height: 380px; }
    </style>
</head>
<body class="bg-gray-100">

    <div class="max-w-5xl mx-auto py-8 px-4">
        <form id="blog-form" class="bg-white rounded-xl shadow-lg overflow-hidden">

            <!-- ── Header ── -->
            <div class="px-8 py-5 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h1 class="text-xl font-bold text-gray-800" id="editor-title">Crear Nuevo Contenido</h1>
                <div class="flex items-center gap-3">
                    <a href="/app/admin-blog" class="text-gray-500 hover:text-gray-700 font-medium px-4">Cancelar</a>
                    <button type="submit" id="save-btn" class="bg-amber-800 hover:bg-amber-900 text-white font-bold py-2 px-6 rounded-lg shadow flex items-center gap-2 transition-colors">
                        <i class="fas fa-save"></i> Guardar
                    </button>
                </div>
            </div>

            <div class="p-8 space-y-6">
                <input type="hidden" id="post-id">

                <!-- ── Toggle Tipo de Contenido ── -->
                <div class="flex items-center gap-4 p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                    <label class="toggle-switch">
                        <input type="checkbox" id="is_event">
                        <span class="toggle-slider"></span>
                    </label>
                    <div>
                        <p class="font-semibold text-indigo-900 text-sm" id="content-type-label">Artículo de Blog</p>
                        <p class="text-xs text-indigo-600" id="content-type-desc">Activa para convertir en Evento (feria, conferencia, etc.)</p>
                    </div>
                    <div class="ml-auto">
                        <span id="type-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-amber-100 text-amber-800">
                            <i class="fas fa-pen-nib mr-1"></i> Blog
                        </span>
                    </div>
                </div>

                <!-- ── Título ── -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
                    <input type="text" id="title"
                        class="w-full text-2xl font-bold p-3 border-b-2 border-gray-200 focus:border-indigo-500 focus:outline-none placeholder-gray-300"
                        placeholder="Escribe un título impactante..." required>
                </div>

                <!-- ── Resumen + Portada ── -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Resumen (SEO & Cards)</label>
                        <textarea id="summary" rows="3"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none text-sm"
                            placeholder="Breve descripción para la grilla..."></textarea>
                    </div>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">URL Imagen de Portada</label>
                            <input type="text" id="cover_image"
                                class="w-full p-2 border border-gray-300 rounded-lg focus:ring-indigo-400 text-sm"
                                placeholder="https://...">
                        </div>
                        <div class="flex items-center p-3 bg-yellow-50 rounded-lg border border-yellow-100">
                            <input type="checkbox" id="is_published" class="h-5 w-5 text-amber-600 rounded focus:ring-amber-500 cursor-pointer">
                            <label for="is_published" class="ml-3 block text-sm font-medium text-yellow-800 cursor-pointer select-none">
                                Publicar inmediatamente (visible para todos)
                            </label>
                        </div>
                    </div>
                </div>

                <!-- ══════════════════════════════════════
                     SECCIÓN DE EVENTO (condicional)
                ══════════════════════════════════════ -->
                <div id="event-fields">
                    <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-6 space-y-5">

                        <!-- Fechas -->
                        <div class="section-header">
                            <i class="fas fa-calendar-alt"></i>
                            <span>Fechas del Evento</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Inicio</label>
                                <input type="date" id="event_start_date"
                                    class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none text-sm bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Fin</label>
                                <input type="date" id="event_end_date"
                                    class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none text-sm bg-white">
                            </div>
                        </div>

                        <!-- Lugar -->
                        <div class="section-header mt-2">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>Lugar del Evento</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Ciudad</label>
                                <input type="text" id="event_city" placeholder="Ej: Medellín"
                                    class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none text-sm bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Departamento / Estado</label>
                                <input type="text" id="event_department" placeholder="Ej: Antioquia"
                                    class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none text-sm bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">País</label>
                                <select id="event_country"
                                    class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none text-sm bg-white">
                                    <option value="">Seleccionar país...</option>
                                    <option value="Colombia">Colombia</option>
                                    <option value="Perú">Perú</option>
                                    <option value="Ecuador">Ecuador</option>
                                    <option value="Bolivia">Bolivia</option>
                                    <option value="Venezuela">Venezuela</option>
                                    <option value="Brasil">Brasil</option>
                                    <option value="México">México</option>
                                    <option value="Guatemala">Guatemala</option>
                                    <option value="Honduras">Honduras</option>
                                    <option value="Costa Rica">Costa Rica</option>
                                    <option value="Panamá">Panamá</option>
                                    <option value="El Salvador">El Salvador</option>
                                    <option value="Nicaragua">Nicaragua</option>
                                    <option value="Chile">Chile</option>
                                    <option value="Argentina">Argentina</option>
                                    <option value="Uruguay">Uruguay</option>
                                    <option value="Paraguay">Paraguay</option>
                                    <option value="España">España</option>
                                    <option value="Estados Unidos">Estados Unidos</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>
                        </div>

                        <!-- Empresas participantes -->
                        <div class="section-header mt-2">
                            <i class="fas fa-building"></i>
                            <span>Empresas Participantes</span>
                        </div>

                        <!-- Chips de seleccionadas -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Empresas seleccionadas</label>
                            <div id="selected-chips" class="chips-container">
                                <span class="text-xs text-gray-400 self-center pl-1" id="no-selected-msg">Ninguna seleccionada</span>
                            </div>
                        </div>

                        <!-- Buscador -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Buscar y agregar empresa</label>
                            <div class="company-search-box">
                                <input type="text" id="company-search" class="company-search-input"
                                    placeholder="🔍  Buscar por nombre de empresa...">
                                <div id="company-list" class="company-list">
                                    <div class="p-4 text-center text-xs text-gray-400">
                                        <i class="fas fa-circle-notch fa-spin mr-1"></i> Cargando empresas...
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <!-- FIN sección evento -->

                <!-- ── Editor Quill ── -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2" id="content-label">Contenido</label>
                    <div class="bg-gray-50 border border-gray-300 rounded-lg">
                        <div id="editor-container" class="bg-white rounded-b-lg"></div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // ─── Quill ───────────────────────────────────────────
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Escribe tu historia aquí...',
            modules: {
                toolbar: [
                    [{ 'header': [2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });

        // ─── Estado global ────────────────────────────────────
        let allCompanies = [];
        let selectedCompanies = []; // [{id, name, logo, source}]

        // ─── Toggle Evento ────────────────────────────────────
        const isEventToggle   = document.getElementById('is_event');
        const eventFields     = document.getElementById('event-fields');
        const typeBadge       = document.getElementById('type-badge');
        const contentTypeLabel = document.getElementById('content-type-label');
        const contentLabel    = document.getElementById('content-label');
        const editorTitle     = document.getElementById('editor-title');

        isEventToggle.addEventListener('change', updateEventUI);

        function updateEventUI() {
            const isEvent = isEventToggle.checked;
            if (isEvent) {
                eventFields.classList.add('open');
                typeBadge.innerHTML = '<i class="fas fa-calendar-alt mr-1"></i> Evento';
                typeBadge.className = 'px-3 py-1 rounded-full text-xs font-bold bg-indigo-100 text-indigo-800';
                contentTypeLabel.textContent = 'Evento';
                contentLabel.textContent = 'Descripción del evento';
                // Cargar empresas si aún no lo hemos hecho
                if (allCompanies.length === 0) loadCompanies();
            } else {
                eventFields.classList.remove('open');
                typeBadge.innerHTML = '<i class="fas fa-pen-nib mr-1"></i> Blog';
                typeBadge.className = 'px-3 py-1 rounded-full text-xs font-bold bg-amber-100 text-amber-800';
                contentTypeLabel.textContent = 'Artículo de Blog';
                contentLabel.textContent = 'Contenido';
            }
        }

        // ─── Cargar empresas ──────────────────────────────────
        async function loadCompanies() {
            try {
                allCompanies = await api('/api/admin/blog/companies');
                renderCompanyList(allCompanies);
            } catch (err) {
                document.getElementById('company-list').innerHTML =
                    `<div class="p-3 text-xs text-red-500">Error cargando empresas: ${err.message}</div>`;
            }
        }

        function renderCompanyList(companies) {
            const list = document.getElementById('company-list');
            if (companies.length === 0) {
                list.innerHTML = '<div class="p-4 text-center text-xs text-gray-400">No se encontraron empresas</div>';
                return;
            }
            list.innerHTML = companies.map(c => {
                const isSelected = selectedCompanies.some(s => s.id == c.id && s.source === c.source);
                const badgeClass = c.source === 'user' ? 'badge-user' : 'badge-suggested';
                const badgeText  = c.source === 'user' ? 'Verificada' : 'Sugerida';
                return `
                <div class="company-item ${isSelected ? 'selected' : ''}"
                     data-id="${c.id}" data-source="${c.source}"
                     onclick="toggleCompany(this, ${JSON.stringify(c).replace(/"/g, '&quot;')})">
                    <img class="company-avatar" src="${c.logo || 'https://placehold.co/30?text=E'}"
                         onerror="this.src='https://placehold.co/30?text=E'" alt="">
                    <span class="company-name">${c.name}</span>
                    <span class="company-badge ${badgeClass}">${badgeText}</span>
                    ${isSelected ? '<i class="fas fa-check company-check"></i>' : ''}
                </div>`;
            }).join('');
        }

        // ─── Buscar empresas ──────────────────────────────────
        document.getElementById('company-search').addEventListener('input', function() {
            const q = this.value.toLowerCase();
            const filtered = allCompanies.filter(c => c.name.toLowerCase().includes(q));
            renderCompanyList(filtered);
        });

        // ─── Toggle selección de empresa ─────────────────────
        function toggleCompany(el, company) {
            const key = company.id + '_' + company.source;
            const idx = selectedCompanies.findIndex(s => s.id == company.id && s.source === company.source);
            if (idx >= 0) {
                selectedCompanies.splice(idx, 1);
            } else {
                selectedCompanies.push(company);
            }
            renderCompanyList(
                document.getElementById('company-search').value
                    ? allCompanies.filter(c => c.name.toLowerCase().includes(document.getElementById('company-search').value.toLowerCase()))
                    : allCompanies
            );
            renderChips();
        }

        function renderChips() {
            const container = document.getElementById('selected-chips');
            const noMsg     = document.getElementById('no-selected-msg');
            if (selectedCompanies.length === 0) {
                container.innerHTML = '<span class="text-xs text-gray-400 self-center pl-1" id="no-selected-msg">Ninguna seleccionada</span>';
                return;
            }
            container.innerHTML = selectedCompanies.map(c => `
                <div class="chip">
                    <img src="${c.logo || 'https://placehold.co/18?text=E'}"
                         onerror="this.src='https://placehold.co/18?text=E'" alt="">
                    <span>${c.name}</span>
                    <span class="chip-remove" onclick="removeChip('${c.id}','${c.source}')">
                        <i class="fas fa-times"></i>
                    </span>
                </div>
            `).join('');
        }

        function removeChip(id, source) {
            selectedCompanies = selectedCompanies.filter(s => !(s.id == id && s.source === source));
            renderChips();
            renderCompanyList(allCompanies);
        }

        // ─── Cargar datos (modo edición) ─────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (postId) {
            document.getElementById('editor-title').innerText = "Editar Contenido";
            document.getElementById('post-id').value = postId;
            loadPostData(postId);
        }

        async function loadPostData(id) {
            try {
                const post = await api(`/api/admin/blog/${id}`);

                document.getElementById('title').value        = post.title;
                document.getElementById('summary').value      = post.summary || '';
                document.getElementById('cover_image').value  = post.cover_image || '';
                document.getElementById('is_published').checked = post.is_published;

                // Campos de evento
                if (post.is_event) {
                    isEventToggle.checked = true;
                    updateEventUI();
                    document.getElementById('event_start_date').value  = post.event_start_date || '';
                    document.getElementById('event_end_date').value    = post.event_end_date || '';
                    document.getElementById('event_city').value        = post.event_city || '';
                    document.getElementById('event_department').value  = post.event_department || '';
                    document.getElementById('event_country').value     = post.event_country || '';

                    // Restaurar empresas seleccionadas
                    if (post.event_companies && Array.isArray(post.event_companies)) {
                        selectedCompanies = post.event_companies;
                        // Cargar la lista completa primero, luego renderizar chips
                        await loadCompanies();
                        renderChips();
                    }
                }

                quill.clipboard.dangerouslyPasteHTML(post.content);
            } catch (error) {
                console.error(error);
                alert("Error cargando el artículo: " + error.message);
                window.location.href = '/app/admin-blog';
            }
        }

        // ─── Guardar ─────────────────────────────────────────
        document.getElementById('blog-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('save-btn');
            const originalHTML = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

            const isEvent = isEventToggle.checked;

            const postData = {
                title:      document.getElementById('title').value,
                summary:    document.getElementById('summary').value,
                cover_image: document.getElementById('cover_image').value,
                content:    quill.root.innerHTML,
                is_published: document.getElementById('is_published').checked,
                is_event:   isEvent,
                event_start_date:  isEvent ? document.getElementById('event_start_date').value  : null,
                event_end_date:    isEvent ? document.getElementById('event_end_date').value    : null,
                event_city:        isEvent ? document.getElementById('event_city').value        : null,
                event_department:  isEvent ? document.getElementById('event_department').value  : null,
                event_country:     isEvent ? document.getElementById('event_country').value     : null,
                event_companies:   isEvent ? selectedCompanies : []
            };

            const id     = document.getElementById('post-id').value;
            const url    = id ? `/api/admin/blog/${id}` : '/api/admin/blog';
            const method = id ? 'PUT' : 'POST';

            try {
                await api(url, { method, body: JSON.stringify(postData) });
                window.location.href = '/app/admin-blog';
            } catch (error) {
                alert('Error al guardar: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalHTML;
            }
        });
    </script>
    <script src="/js/nav-loader.js" defer></script>
</body>
</html>
