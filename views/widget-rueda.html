<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Sensorial - Ruru Lab</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="/js/d3-sunburst.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: transparent; }
        #widget-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .error { color: #ef4444; font-size: 14px; font-weight: bold; text-align: center; padding: 20px; }
        #chart { width: 100%; height: 100%; max-width: 600px; max-height: 600px; }
    </style>
</head>
<body>
    <div id="widget-container">
        <div id="chart"></div>
    </div>

    <script>
        const injectedData = {{{RUEDA_DATA_JSON}}};
        
        if (injectedData.error) {
            document.getElementById('widget-container').innerHTML = `<div class="error"><p>${injectedData.error}</p></div>`;
        } else {
            initWidget();
        }

        async function initWidget() {
            try {
                const response = await fetch('/data/flavor-wheels.json');
                const allWheels = await response.json();
                const wheelData = allWheels[injectedData.tipo];

                if (!wheelData) {
                    document.getElementById('widget-container').innerHTML = `<p class="error">Tipo de rueda no soportado: ${injectedData.tipo}</p>`;
                    return;
                }

                // Render with pruning logic enabled
                SunburstChart.render('#chart', wheelData, {
                    selection: injectedData.notas_json,
                    isWidget: true,
                    width: 600,
                    height: 600
                });
            } catch (e) {
                console.error("Widget error:", e);
                document.getElementById('widget-container').innerHTML = `<p class="error">Error al cargar el gráfico sensorial</p>`;
            }
        }
    </script>
</body>
</html>
