<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Producto - Ruru Lab</title>
    <meta name="description"
        content="Descubre la trazabilidad completa, perfil sensorial y origen de este producto en Ruru Lab. Transparencia desde la finca hasta tu mesa.">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="product">
    <meta property="og:url" content="">
    <meta property="og:title" content="Detalle de Producto - Ruru Lab">
    <meta property="og:description"
        content="Descubre la trazabilidad completa, perfil sensorial y origen de este producto en Ruru Lab.">
    <meta property="og:image" content="">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="">
    <meta name="twitter:title" content="Detalle de Producto - Ruru Lab">
    <meta name="twitter:description"
        content="Descubre la trazabilidad completa, perfil sensorial y origen de este producto en Ruru Lab.">
    <meta name="twitter:image" content="">

    <!-- Structured Data -->
    <script type="application/ld+json" id="product-jsonld"></script>

    <link rel="preload" as="style" href="/css/styles.css" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="/css/styles.css">
    </noscript>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">

    <script src="/js/analytics-loader.js" defer></script>
    <style>
        /* CRITICAL CSS */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfaf6;
            margin: 0;
            padding: 0;
        }

        #public-nav-placeholder {
            min-height: 80px;
        }

        .skeleton {
            background: #e2e8f0;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            border-radius: 0.5rem;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        .aspect-square {
            aspect-ratio: 1 / 1;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        .tab-btn.active {
            color: #854d0e;
            border-bottom: 2px solid #854d0e;
        }

        .tab-btn {
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .product-gallery-main {
            width: 100%;
            aspect-square;
            border-radius: 1.5rem;
            background: white;
            padding: 2rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            border-radius: 0.5rem;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .thumbnail.active {
            border-color: #854d0e;
        }

        .section-header {
            position: relative;
            margin-bottom: 2rem;
        }

        .section-header::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 40px;
            height: 3px;
            background: #854d0e;
        }

        /* Estilos Mapa */
        .leaflet-container {
            border-radius: 1rem;
        }

        /* Timeline Cards */
        .timeline-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            pb-4;
        }

        .timeline-card {
            min-width: 280px;
            background: white;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid #f1f1f1;
        }

        .timeline-card.active {
            border-color: #854d0e;
            box-shadow: 0 5px 15px -5px rgba(133, 77, 14, 0.2);
        }

        /* Sunburst */
        #sunburst-container svg {
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body class="text-stone-800 antialiased min-h-screen flex flex-col">

    <div id="public-nav-placeholder"></div>

    <main class="container mx-auto px-6 py-6">

        <!-- Brand Header -->
        <div id="brand-header" class="flex items-center gap-4 mb-8 pb-6 border-b border-stone-200 hidden">
            <div
                class="w-16 h-16 rounded-2xl bg-white shadow-sm border border-stone-100 p-2 flex items-center justify-center overflow-hidden">
                <img id="brand-logo" src="" alt="Logo" class="max-w-full max-h-full object-contain">
            </div>
            <div>
                <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-0.5">Marca / Productor</p>
                <h2 id="brand-name" class="text-2xl font-display font-bold text-stone-900"></h2>
            </div>
        </div>

        <!-- Breadcrumb -->
        <nav id="product-breadcrumb" aria-label="Migas de pan"
            class="flex items-center gap-1.5 text-xs font-medium text-stone-400 mb-6 flex-wrap hidden">
            <a id="breadcrumb-store" href="#" class="hover:text-amber-700 transition-colors flex items-center gap-1">
                <i class="fas fa-store text-[10px]"></i>
                <span id="breadcrumb-store-name" class="truncate max-w-[160px]">Empresa</span>
            </a>
            <i class="fas fa-chevron-right text-[8px] text-stone-300"></i>
            <a id="breadcrumb-store-products" href="#" class="hover:text-amber-700 transition-colors">Productos</a>
            <i class="fas fa-chevron-right text-[8px] text-stone-300"></i>
            <span id="breadcrumb-product" class="text-amber-800 font-semibold truncate max-w-[200px]"></span>
        </nav>

        <!-- Parte Superior: Galería, Premios e Info -->
        <div class="flex flex-col lg:flex-row gap-12 mb-12">
            <!-- Columna Izquierda: Galería y Premios (5/12) -->
            <div class="w-full lg:w-5/12">
                <!-- Contenedor Imagen + Premios Overlaid -->
                <div class="relative group">
                    <!-- Imagen Principal -->
                    <div class="product-gallery-main flex items-center justify-center overflow-hidden relative">
                        <img id="main-product-image" src="" alt="Producto"
                            class="max-w-full max-h-full object-contain z-10">

                        <!-- Premios Overlaid (Esquina superior derecha de la imagen) -->
                        <div id="awards-overlay" class="absolute top-4 right-4 z-20 flex flex-col gap-2">
                            <!-- Se llenan con JS -->
                        </div>
                    </div>
                </div>
                <!-- Miniaturas (Debajo) -->
                <div id="thumbnail-gallery" class="flex gap-3 px-1 mt-4">
                    <!-- Thumbnails se llenan con JS -->
                </div>
            </div>

            <!-- Columna Derecha: Información Principal (7/12) -->
            <div class="w-full lg:w-7/12">
                <!-- Header -->
                <div class="mb-8">
                    <div
                        class="flex items-center gap-2 text-xs font-bold text-stone-400 uppercase tracking-widest mb-3">
                        <a href="/marketplace" class="hover:text-stone-600">Marketplace</a>
                        <i class="fas fa-chevron-right text-[8px]"></i>
                        <span id="breadcrumb-category" class="text-amber-800">Cacao</span>
                    </div>
                    <h1 id="product-title"
                        class="text-4xl md:text-5xl font-display font-bold text-stone-900 leading-tight mb-4">
                        <!-- Título -->
                    </h1>
                    <p id="product-description" class="text-stone-500 text-lg leading-relaxed max-w-2xl">
                        <!-- Descripción corta -->
                    </p>

                    <!-- Precio y Tamaño -->
                    <div class="flex flex-wrap items-center gap-8 mt-10">
                        <div id="price-container" class="flex flex-col border-r border-stone-200 pr-10">
                            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1.5">Precio
                                Sugerido</span>
                            <p id="product-price" class="text-3xl font-black text-amber-900 tracking-tight">
                                <!-- Precio se inyecta desde JS -->
                            </p>
                        </div>
                        <div id="size-container" class="flex flex-col">
                            <span
                                class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1.5">Presentación</span>
                            <p id="product-size" class="text-xl font-bold text-stone-700">
                                <!-- Tamaño se inyecta desde JS -->
                            </p>
                        </div>
                    </div>

                    <!-- Botón WhatsApp -->
                    <div class="pt-10">
                        <a id="whatsapp-btn" href="#" target="_blank"
                            class="inline-flex items-center gap-4 px-10 py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-[2rem] font-bold shadow-xl shadow-emerald-100 hover:shadow-emerald-200 transition-all transform hover:-translate-y-1 active:scale-95 group">
                            <i class="fab fa-whatsapp text-2xl group-hover:rotate-12 transition-transform"></i>
                            <span class="tracking-wide">COMPRAR POR WHATSAPP</span>
                        </a>
                        <div class="flex items-center gap-2 mt-4 text-[10px] text-stone-400 font-medium ml-4">
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                            Enlace directo con el productor
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Parte Inferior: Tabs de Ancho Completo -->
        <div class="w-full">
            <!-- Tabs Navigation -->
            <div class="border-b border-stone-200 mb-8 overflow-x-auto hide-scrollbar">
                <nav class="flex gap-8 min-w-max">
                    <button onclick="app.switchTab('origen')"
                        class="tab-btn active px-1 py-4 text-xs font-bold uppercase tracking-widest flex items-center gap-2"
                        data-tab="origen">
                        <i class="fas fa-compass"></i> ORIGEN
                    </button>
                    <button onclick="app.switchTab('trazabilidad')"
                        class="tab-btn px-1 py-4 text-xs font-bold uppercase tracking-widest flex items-center gap-2"
                        data-tab="trazabilidad">
                        <i class="fas fa-route"></i> TRAZABILIDAD
                    </button>
                    <button onclick="app.switchTab('proceso')"
                        class="tab-btn px-1 py-4 text-xs font-bold uppercase tracking-widest flex items-center gap-2 hidden"
                        data-tab="proceso">
                        <i class="fas fa-route"></i> RUTA DE PROCESO
                    </button>
                    <button onclick="app.switchTab('specs')"
                        class="tab-btn px-1 py-4 text-xs font-bold uppercase tracking-widest flex items-center gap-2"
                        data-tab="specs">
                        <i class="fas fa-list-check"></i> ESPECIFICACIONES
                    </button>
                    <button onclick="app.switchTab('analisis')"
                        class="tab-btn px-1 py-4 text-xs font-bold uppercase tracking-widest flex items-center gap-2"
                        data-tab="analisis">
                        <i class="fas fa-chart-line"></i> ANÁLISIS
                    </button>
                    <button onclick="app.switchTab('maridaje')"
                        class="tab-btn px-1 py-4 text-xs font-bold uppercase tracking-widest flex items-center gap-2 hidden"
                        data-tab="maridaje">
                        <i class="fas fa-wine-glass"></i> MARIDAJE
                    </button>
                </nav>
            </div>

            <!-- Tab Contents -->
            <div id="tab-content" class="min-h-[500px]">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </main>

    <script src="/js/public-nav-loader.js" defer></script>
    <script src="/js/producto-detalle-app.js" defer></script>
</body>

</html>
